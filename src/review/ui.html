<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 280px;
      --bg: #0a0a0b;
      --surface: #111113;
      --surface-2: #18181b;
      --border: #27272a;
      --border-subtle: #1e1e21;
      --text: #fafafa;
      --muted: #71717a;
      --muted-2: #52525b;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-dim: rgba(99,102,241,.15);
      --danger: #ef4444;
      --danger-hover: #f87171;
      --success: #22c55e;
      --warn-bg: rgba(234,179,8,.12);
      --warn-text: #fbbf24;
      --warn-border: rgba(234,179,8,.3);
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
      --glow: 0 0 0 1px rgba(99,102,241,.3), 0 0 20px rgba(99,102,241,.08);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }

    /* ---- Sidebar ---- */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #sidebar-header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .02em;
      background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #refresh-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.15s, border-color 0.15s;
    }
    #refresh-btn:hover { color: var(--text); border-color: var(--muted-2); }

    #queue-list {
      overflow-y: auto;
      flex: 1;
    }

    .queue-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .queue-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    .queue-item:hover { background: var(--surface-2); }
    .queue-item.active { background: var(--accent-dim); border-left: 3px solid var(--accent); }

    .queue-item-id {
      font-weight: 600;
      font-size: 13px;
      font-family: ui-monospace, monospace;
    }

    .queue-item-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 4px;
    }

    .queue-item-date { font-size: 11px; color: var(--muted); }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-pass { background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.25); }
    .badge-fail { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.25); }

    #sidebar-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border-subtle);
      font-size: 11px;
      color: var(--muted-2);
    }

    /* ---- Main panel ---- */
    #main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #main-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted-2);
      font-size: 14px;
      gap: 8px;
    }
    #main-empty::before {
      content: "◫";
      font-size: 32px;
      opacity: .3;
    }

    /* ---- Draft header ---- */
    #draft-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border-subtle);
      padding: 18px 24px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    #draft-header-info { flex: 1; min-width: 0; }
    #draft-item-id {
      font-size: 16px;
      font-weight: 700;
      font-family: ui-monospace, monospace;
      color: var(--accent-hover);
      letter-spacing: .02em;
    }
    #draft-meta { color: var(--muted); font-size: 12px; margin-top: 3px; }

    #draft-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.1s, opacity 0.1s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-approve {
      background: rgba(34,197,94,.18);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,.3);
    }
    .btn-approve:hover:not(:disabled) {
      background: rgba(34,197,94,.28);
      border-color: rgba(34,197,94,.5);
    }

    .btn-reject {
      background: rgba(239,68,68,.15);
      color: #f87171;
      border: 1px solid rgba(239,68,68,.25);
    }
    .btn-reject:hover:not(:disabled) {
      background: rgba(239,68,68,.25);
      border-color: rgba(239,68,68,.45);
    }

    /* ---- Tripwire banner ---- */
    #tripwire-banner {
      margin: 16px 24px 0;
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--warn-text);
    }
    #tripwire-banner strong { display: block; margin-bottom: 4px; }
    #tripwire-banner ul { padding-left: 16px; }

    /* ---- Caption / hashtags ---- */
    #caption-section {
      margin: 16px 24px 0;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }
    #caption-section h3 { font-size: 10px; font-weight: 600; color: var(--muted-2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    #caption-text { font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; color: var(--text); }
    #hashtags { margin-top: 10px; font-size: 12px; color: var(--accent-hover); }

    /* ---- Slides grid ---- */
    #slides-section {
      padding: 16px 24px 32px;
    }

    #slides-section h3 {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted-2);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 14px;
    }

    #slides-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .slide-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .slide-card:hover {
      border-color: var(--muted-2);
      box-shadow: var(--shadow-lg);
    }

    .slide-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--surface-2);
    }

    .slide-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted-2);
      font-family: ui-monospace, monospace;
      width: 28px;
    }

    .role-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: .04em;
      background: rgba(99,102,241,.15);
      color: var(--accent-hover);
      border: 1px solid rgba(99,102,241,.25);
    }
    .role-hook     { background: rgba(99,102,241,.2);  color: #a5b4fc; border-color: rgba(99,102,241,.35); }
    .role-cta      { background: rgba(99,102,241,.35); color: #c7d2fe; border-color: rgba(99,102,241,.5); }
    .role-source   { background: rgba(113,113,122,.15); color: #a1a1aa; border-color: rgba(113,113,122,.3); }
    .role-evidence { background: rgba(34,197,94,.12);  color: #86efac; border-color: rgba(34,197,94,.25); }
    .role-takeaway { background: rgba(251,146,60,.12); color: #fdba74; border-color: rgba(251,146,60,.25); }

    .slide-img {
      width: 100%;
      aspect-ratio: 1080/1350;
      object-fit: cover;
      background: var(--surface-2);
      display: block;
    }
    .slide-img-placeholder {
      width: 100%;
      aspect-ratio: 1080/1350;
      background: repeating-linear-gradient(
        45deg,
        var(--surface-2),
        var(--surface-2) 10px,
        var(--bg) 10px,
        var(--bg) 20px
      );
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted-2);
      font-size: 12px;
    }

    .slide-fields { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

    .field-row { display: flex; flex-direction: column; gap: 2px; }

    .field-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted-2);
    }

    .field-value {
      font-size: 13px;
      line-height: 1.5;
      cursor: pointer;
      padding: 5px 7px;
      border-radius: 5px;
      border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s;
      min-height: 28px;
      color: var(--text);
    }
    .field-value:hover { background: var(--surface-2); border-color: var(--border); }
    .field-value.highlight { font-weight: 600; color: var(--accent-hover); }
    .field-value.empty { color: var(--muted-2); font-style: italic; }

    .field-editing {
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    .field-editing.active { display: flex; }
    .field-editing textarea, .field-editing input {
      font-family: inherit;
      font-size: 13px;
      padding: 6px 8px;
      border: 1px solid var(--accent);
      border-radius: 5px;
      resize: vertical;
      outline: none;
      width: 100%;
      line-height: 1.5;
      background: var(--surface-2);
      color: var(--text);
      box-shadow: var(--glow);
    }
    .field-editing-actions { display: flex; gap: 6px; }
    .btn-save {
      background: var(--accent);
      color: #fff;
      padding: 4px 12px;
      font-size: 12px;
      border: 1px solid transparent;
    }
    .btn-save:hover { background: var(--accent-hover); }
    .btn-cancel-edit {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      font-size: 12px;
    }
    .btn-cancel-edit:hover { background: var(--surface-2); color: var(--text); }

    /* ---- Toast ---- */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: rgba(34,197,94,.2); border-color: rgba(34,197,94,.35); color: #86efac; }
    #toast.error   { background: rgba(239,68,68,.2); border-color: rgba(239,68,68,.35); color: #fca5a5; }
    #toast.info    { background: var(--surface-2); border-color: var(--border); color: var(--text); }

    /* ---- Loading spinner ---- */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h1>Carousel Review</h1>
    <button id="refresh-btn" title="Refresh queue">Refresh</button>
  </div>
  <div id="queue-list">
    <div class="queue-empty">Loading…</div>
  </div>
  <div id="sidebar-footer">Auto-refreshes every 30s</div>
</aside>

<!-- Main panel -->
<main id="main">
  <div id="main-empty">Select a draft from the queue</div>

  <!-- Draft content (hidden until a draft is selected) -->
  <div id="draft-content" style="display:none; flex-direction:column; flex:1;">
    <div id="draft-header">
      <div id="draft-header-info">
        <div id="draft-item-id"></div>
        <div id="draft-meta"></div>
      </div>
      <div id="draft-actions">
        <button class="btn btn-approve" id="approve-btn">Approve</button>
        <button class="btn btn-reject"  id="reject-btn">Reject</button>
      </div>
    </div>

    <div id="tripwire-banner" style="display:none;">
      <strong>Tripwire violations detected</strong>
      <ul id="tripwire-list"></ul>
    </div>

    <div id="caption-section">
      <h3>Caption &amp; Hashtags</h3>
      <div id="caption-text"></div>
      <div id="hashtags"></div>
    </div>

    <div id="slides-section">
      <h3>Slides</h3>
      <div id="slides-grid"></div>
    </div>
  </div>
</main>

<!-- Toast notification -->
<div id="toast"></div>

<script>
  // ---- State ----
  let currentItemId = null;
  let currentDraft = null;
  let refreshTimer = null;

  // ---- Utilities ----
  function toast(msg, type = 'info', duration = 3000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    setTimeout(() => { el.className = ''; }, duration);
  }

  function fmt(isoStr) {
    if (!isoStr) return '';
    return new Date(isoStr).toLocaleString(undefined, {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
  }

  async function api(method, path, body) {
    const opts = { method, headers: {} };
    if (body !== undefined) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const res = await fetch(path, opts);
    const json = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(json.error ?? `HTTP ${res.status}`);
    return json;
  }

  // ---- Queue ----
  async function loadQueue() {
    const list = document.getElementById('queue-list');
    try {
      const items = await api('GET', '/queue');
      if (!items.length) {
        list.innerHTML = '<div class="queue-empty">No pending drafts</div>';
        return;
      }
      list.innerHTML = items.map(item => `
        <div class="queue-item${item.item_id === currentItemId ? ' active' : ''}"
             data-id="${item.item_id}">
          <div class="queue-item-id">${item.item_id}</div>
          <div class="queue-item-meta">
            <span class="queue-item-date">${fmt(item.created_at)}</span>
            <span class="badge ${item.tripwire_passed ? 'badge-pass' : 'badge-fail'}">
              ${item.tripwire_passed ? 'clean' : 'tripwire'}
            </span>
          </div>
        </div>
      `).join('');

      list.querySelectorAll('.queue-item').forEach(el => {
        el.addEventListener('click', () => selectDraft(el.dataset.id));
      });
    } catch (e) {
      list.innerHTML = `<div class="queue-empty" style="color:var(--danger)">Error: ${e.message}</div>`;
    }
  }

  // ---- Draft detail ----
  async function selectDraft(itemId) {
    currentItemId = itemId;
    // Highlight active item in sidebar
    document.querySelectorAll('.queue-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === itemId);
    });

    document.getElementById('main-empty').style.display = 'none';
    const content = document.getElementById('draft-content');
    content.style.display = 'flex';

    document.getElementById('draft-item-id').textContent = itemId;
    document.getElementById('draft-meta').textContent = 'Loading…';
    document.getElementById('slides-grid').innerHTML = '';
    document.getElementById('tripwire-banner').style.display = 'none';

    try {
      const { slides, metadata } = await api('GET', `/queue/${itemId}`);
      currentDraft = { slides, metadata };
      renderDraft(slides, metadata);
    } catch (e) {
      document.getElementById('draft-meta').textContent = `Error: ${e.message}`;
      toast(`Failed to load draft: ${e.message}`, 'error');
    }
  }

  function renderDraft(slides, metadata) {
    // Header
    document.getElementById('draft-item-id').textContent = metadata.item_id;
    document.getElementById('draft-meta').textContent =
      `${fmt(metadata.created_at)} · v${metadata.pipeline_version} · ${metadata.generation_attempts} attempt(s)`;

    // Tripwire
    const banner = document.getElementById('tripwire-banner');
    if (!metadata.tripwire_checks.passed) {
      banner.style.display = 'block';
      const ul = document.getElementById('tripwire-list');
      ul.innerHTML = metadata.tripwire_checks.violations.map(v => {
        const loc = v.in_caption ? 'caption' : `slide ${v.slide_index}`;
        return `<li><strong>${v.category_id}</strong>: "${v.phrase}" in ${loc}</li>`;
      }).join('');
    } else {
      banner.style.display = 'none';
    }

    // Caption
    document.getElementById('caption-text').textContent = slides.caption ?? '';
    const tags = (slides.hashtags ?? []).join(' ');
    document.getElementById('hashtags').textContent = tags;

    // Slides
    const grid = document.getElementById('slides-grid');
    grid.innerHTML = '';
    (slides.slides ?? []).forEach(slide => {
      grid.appendChild(buildSlideCard(slide));
    });
  }

  function buildSlideCard(slide) {
    const card = document.createElement('div');
    card.className = 'slide-card';
    card.dataset.index = slide.index;

    // Header
    const header = document.createElement('div');
    header.className = 'slide-card-header';
    header.innerHTML = `
      <span class="slide-num">#${slide.index}</span>
      <span class="badge role-badge role-${slide.role}">${slide.role}</span>
    `;
    card.appendChild(header);

    // Image
    const imgSrc = `/queue/${currentItemId}/slides/slide-${String(slide.index).padStart(2, '0')}.png`;
    const img = document.createElement('img');
    img.className = 'slide-img';
    img.alt = `Slide ${slide.index}`;
    img.onerror = function() {
      this.replaceWith(Object.assign(document.createElement('div'), {
        className: 'slide-img-placeholder',
        textContent: 'Image not yet composed'
      }));
    };
    img.src = imgSrc;
    card.appendChild(img);

    // Editable fields
    const fields = document.createElement('div');
    fields.className = 'slide-fields';

    const editableFields = [
      { key: 'headline', label: 'Headline', multiline: false },
      { key: 'body',     label: 'Body',     multiline: true  },
      { key: 'highlight_word', label: 'Highlight word', multiline: false },
    ];

    editableFields.forEach(({ key, label, multiline }) => {
      const val = slide[key] ?? '';
      const row = document.createElement('div');
      row.className = 'field-row';
      row.innerHTML = `<span class="field-label">${label}</span>`;

      // Display value
      const display = document.createElement('div');
      display.className = 'field-value' + (key === 'highlight_word' ? ' highlight' : '') + (!val ? ' empty' : '');
      display.textContent = val || '(empty)';
      display.title = 'Click to edit';

      // Edit UI
      const editArea = document.createElement('div');
      editArea.className = 'field-editing';
      const input = multiline
        ? Object.assign(document.createElement('textarea'), { rows: 3 })
        : document.createElement('input');
      input.value = val;
      const actions = document.createElement('div');
      actions.className = 'field-editing-actions';
      const saveBtn   = Object.assign(document.createElement('button'), { textContent: 'Save', className: 'btn btn-save' });
      const cancelBtn = Object.assign(document.createElement('button'), { textContent: 'Cancel', className: 'btn btn-cancel-edit' });
      actions.append(saveBtn, cancelBtn);
      editArea.append(input, actions);

      // Toggle edit
      display.addEventListener('click', () => {
        display.style.display = 'none';
        editArea.classList.add('active');
        input.focus();
      });

      cancelBtn.addEventListener('click', () => {
        input.value = slide[key] ?? '';
        editArea.classList.remove('active');
        display.style.display = '';
      });

      saveBtn.addEventListener('click', async () => {
        const newVal = input.value.trim();
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner"></span>';
        try {
          await api('PATCH', `/queue/${currentItemId}/slide/${slide.index}`, { [key]: newVal });
          slide[key] = newVal;
          display.textContent = newVal || '(empty)';
          display.classList.toggle('empty', !newVal);
          editArea.classList.remove('active');
          display.style.display = '';
          toast('Slide updated', 'success');
        } catch (e) {
          toast(`Save failed: ${e.message}`, 'error');
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save';
        }
      });

      row.append(display, editArea);
      fields.appendChild(row);
    });

    card.appendChild(fields);
    return card;
  }

  // ---- Approve / Reject ----
  document.getElementById('approve-btn').addEventListener('click', async () => {
    if (!currentItemId) return;
    if (!confirm(`Approve ${currentItemId} for publishing?`)) return;
    const btn = document.getElementById('approve-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Approving…';
    try {
      await api('POST', `/queue/${currentItemId}/approve`);
      toast(`${currentItemId} approved`, 'success');
      currentItemId = null;
      document.getElementById('draft-content').style.display = 'none';
      document.getElementById('main-empty').style.display = 'flex';
      await loadQueue();
    } catch (e) {
      toast(`Approve failed: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Approve';
    }
  });

  document.getElementById('reject-btn').addEventListener('click', async () => {
    if (!currentItemId) return;
    const reason = prompt(`Reason for rejecting ${currentItemId}:`);
    if (!reason || !reason.trim()) return;
    const btn = document.getElementById('reject-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Rejecting…';
    try {
      await api('POST', `/queue/${currentItemId}/reject`, { reason: reason.trim() });
      toast(`${currentItemId} rejected`, 'info');
      currentItemId = null;
      document.getElementById('draft-content').style.display = 'none';
      document.getElementById('main-empty').style.display = 'flex';
      await loadQueue();
    } catch (e) {
      toast(`Reject failed: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Reject';
    }
  });

  // ---- Refresh ----
  document.getElementById('refresh-btn').addEventListener('click', loadQueue);

  function scheduleRefresh() {
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(async () => {
      await loadQueue();
      scheduleRefresh();
    }, 30000);
  }

  // ---- Init ----
  loadQueue().then(scheduleRefresh);
</script>
</body>
</html>
